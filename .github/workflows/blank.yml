name: Build Caddy

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Install xcaddy
        run: go install github.com/caddyserver/xcaddy/cmd/xcaddy@latest

      - name: Build Caddy for arm64
        run: |
          GOOS=linux GOARCH=arm64 ~/go/bin/xcaddy build \
            --with github.com/caddy-dns/cloudflare@latest \
            --output caddy_linux_arm64

      - name: Get Caddy version
        id: version
        run: echo "version=$(./caddy_linux_arm64 version 2>/dev/null || echo v$(date +%Y%m%d))" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: Caddy ${{ steps.version.outputs.version }} with Cloudflare DNS
          body: |
            Caddy with caddy-dns/cloudflare plugin (arm64)
            Built with github.com/caddy-dns/cloudflare@latest
          files: caddy_linux_arm64
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
